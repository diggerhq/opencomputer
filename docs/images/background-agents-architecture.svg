<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" font-family="ui-sans-serif, system-ui, sans-serif">
  <defs>
    <marker id="ah" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0.6 0.8 L7.4 4 L0.6 7.2 Z" fill="#9a9a9a"/>
    </marker>
    <marker id="ahs" viewBox="0 0 8 8" refX="1" refY="4" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M7.4 0.8 L0.6 4 L7.4 7.2 Z" fill="#9a9a9a"/>
    </marker>
  </defs>

  <!-- canvas -->
  <rect x="0.5" y="0.5" width="959" height="559" rx="12" fill="#ffffff" stroke="#e5e5e5" stroke-width="1"/>

  <!-- ============ LEFT: Triggers ============ -->
  <text x="44" y="202" font-size="10" letter-spacing="1.5" fill="#6b6b6b">TRIGGERS</text>

  <rect x="40" y="214" width="116" height="30" rx="15" fill="#ffffff" stroke="#d4d4d4"/>
  <text x="98" y="233" font-size="12" fill="#131311" text-anchor="middle">issue labeled</text>

  <rect x="40" y="256" width="116" height="30" rx="15" fill="#ffffff" stroke="#d4d4d4"/>
  <text x="98" y="275" font-size="12" fill="#131311" text-anchor="middle">PR comment</text>

  <rect x="40" y="298" width="116" height="30" rx="15" fill="#ffffff" stroke="#d4d4d4"/>
  <text x="98" y="317" font-size="12" fill="#131311" text-anchor="middle">API / CLI</text>

  <line x1="160" y1="229" x2="183" y2="229" stroke="#9a9a9a" stroke-width="1.25" marker-end="url(#ah)"/>
  <line x1="160" y1="271" x2="183" y2="271" stroke="#9a9a9a" stroke-width="1.25" marker-end="url(#ah)"/>
  <line x1="160" y1="313" x2="183" y2="313" stroke="#9a9a9a" stroke-width="1.25" marker-end="url(#ah)"/>

  <!-- ============ CENTER: Session (durable) ============ -->
  <rect x="190" y="70" width="212" height="400" rx="10" fill="#f4f4f2" stroke="#d4d4d4"/>
  <text x="206" y="100" font-size="15" font-weight="600" fill="#131311">Session<tspan font-size="12" font-weight="400" fill="#6b6b6b"> — durable timeline</tspan></text>

  <!-- event rows -->
  <rect x="206" y="122" width="180" height="34" rx="6" fill="#f0eff7" stroke="#cfcee4"/>
  <circle cx="222" cy="139" r="3" fill="#7c7aae"/>
  <text x="234" y="143" font-size="12" fill="#131311">message</text>

  <rect x="206" y="166" width="180" height="34" rx="6" fill="#f0eff7" stroke="#cfcee4"/>
  <circle cx="222" cy="183" r="3" fill="#7c7aae"/>
  <text x="234" y="187" font-size="12" fill="#131311">action</text>

  <rect x="206" y="210" width="180" height="34" rx="6" fill="#f0eff7" stroke="#cfcee4"/>
  <circle cx="222" cy="227" r="3" fill="#7c7aae"/>
  <text x="234" y="231" font-size="12" fill="#131311">action</text>

  <rect x="206" y="254" width="180" height="34" rx="6" fill="#f0eff7" stroke="#cfcee4"/>
  <circle cx="222" cy="271" r="3" fill="#7c7aae"/>
  <text x="234" y="275" font-size="12" fill="#131311">delivery</text>

  <rect x="206" y="298" width="180" height="34" rx="6" fill="#f0eff7" stroke="#cfcee4"/>
  <circle cx="222" cy="315" r="3" fill="#7c7aae"/>
  <text x="234" y="319" font-size="12" fill="#131311">status</text>

  <!-- next append slot -->
  <rect x="206" y="342" width="180" height="34" rx="6" fill="none" stroke="#cfcee4" stroke-dasharray="4 4" opacity="0.8"/>

  <text x="296" y="430" font-size="11" fill="#6b6b6b" text-anchor="middle">append-only</text>
  <text x="296" y="446" font-size="11" fill="#6b6b6b" text-anchor="middle">stored as events happen</text>

  <!-- ============ RIGHT TOP: Runtime (disposable) ============ -->
  <rect x="502" y="70" width="176" height="84" rx="10" fill="#ffffff" stroke="#b8b8b8" stroke-width="1.2" stroke-dasharray="6 4"/>
  <text x="518" y="100" font-size="15" font-weight="600" fill="#131311">Runtime<tspan font-size="12" font-weight="400" fill="#6b6b6b"> — the loop</tspan></text>
  <text x="518" y="124" font-size="11" fill="#6b6b6b">stateless · no credentials</text>

  <!-- Session <-> Runtime -->
  <line x1="410" y1="112" x2="494" y2="112" stroke="#9a9a9a" stroke-width="1.25" marker-start="url(#ahs)" marker-end="url(#ah)"/>
  <text x="452" y="100" font-size="11" fill="#6b6b6b" text-anchor="middle">reads / appends</text>

  <!-- Runtime -> Gateway -->
  <line x1="682" y1="112" x2="701" y2="112" stroke="#9a9a9a" stroke-width="1.25" marker-end="url(#ah)"/>

  <!-- ============ RIGHT: Model gateway (durable) ============ -->
  <rect x="708" y="70" width="216" height="104" rx="10" fill="#f4f4f2" stroke="#d4d4d4"/>
  <text x="724" y="98" font-size="15" font-weight="600" fill="#131311">Model gateway</text>
  <text x="724" y="120" font-size="11" fill="#6b6b6b">applies configured model</text>
  <text x="724" y="136" font-size="11" fill="#7c7aae">records every request + response</text>
  <text x="724" y="152" font-size="11" fill="#6b6b6b">holds provider keys</text>

  <!-- provider chips -->
  <line x1="742" y1="178" x2="742" y2="194" stroke="#9a9a9a" stroke-width="1.25" marker-end="url(#ah)"/>
  <line x1="812" y1="178" x2="812" y2="194" stroke="#9a9a9a" stroke-width="1.25" marker-end="url(#ah)"/>
  <line x1="886" y1="178" x2="886" y2="194" stroke="#9a9a9a" stroke-width="1.25" marker-end="url(#ah)"/>

  <rect x="708" y="200" width="68" height="24" rx="12" fill="#ffffff" stroke="#d4d4d4"/>
  <text x="742" y="216" font-size="11" fill="#131311" text-anchor="middle">Anthropic</text>

  <rect x="784" y="200" width="56" height="24" rx="12" fill="#ffffff" stroke="#d4d4d4"/>
  <text x="812" y="216" font-size="11" fill="#131311" text-anchor="middle">OpenAI</text>

  <rect x="848" y="200" width="76" height="24" rx="12" fill="#ffffff" stroke="#d4d4d4"/>
  <text x="886" y="216" font-size="11" fill="#131311" text-anchor="middle">OpenRouter</text>

  <!-- Runtime -> Sandbox -->
  <line x1="590" y1="158" x2="590" y2="293" stroke="#9a9a9a" stroke-width="1.25" marker-end="url(#ah)"/>
  <text x="578" y="230" font-size="11" fill="#6b6b6b" text-anchor="end">acts: commands · edits · tests</text>

  <!-- ============ RIGHT BOTTOM: Sandbox (disposable) ============ -->
  <rect x="502" y="300" width="176" height="84" rx="10" fill="#ffffff" stroke="#b8b8b8" stroke-width="1.2" stroke-dasharray="6 4"/>
  <text x="518" y="330" font-size="15" font-weight="600" fill="#131311">Sandbox<tspan font-size="12" font-weight="400" fill="#6b6b6b"> — the machine</tspan></text>
  <text x="518" y="354" font-size="11" fill="#6b6b6b">booted from workspace build</text>

  <!-- Sandbox -> snapshots (durable) -->
  <line x1="684" y1="342" x2="737" y2="342" stroke="#9a9a9a" stroke-width="1.25" marker-end="url(#ah)"/>
  <rect x="744" y="328" width="152" height="28" rx="6" fill="#f0eff7" stroke="#b9b8d6"/>
  <text x="820" y="346" font-size="11" fill="#131311" text-anchor="middle">snapshots (periodic)</text>

  <!-- Sandbox -> delivery -->
  <line x1="590" y1="388" x2="590" y2="437" stroke="#9a9a9a" stroke-width="1.25" marker-end="url(#ah)"/>
  <text x="600" y="418" font-size="11" fill="#6b6b6b">delivery</text>

  <rect x="512" y="444" width="156" height="30" rx="15" fill="#ffffff" stroke="#d4d4d4"/>
  <text x="590" y="463" font-size="12" fill="#131311" text-anchor="middle">draft PR · as @user</text>

  <!-- ============ Legend ============ -->
  <rect x="44" y="506" width="22" height="14" rx="4" fill="#f0eff7" stroke="#7c7aae"/>
  <text x="74" y="517" font-size="11" fill="#6b6b6b">durable (survives anything)</text>

  <rect x="252" y="506" width="22" height="14" rx="4" fill="#ffffff" stroke="#b8b8b8" stroke-dasharray="3 3"/>
  <text x="282" y="517" font-size="11" fill="#6b6b6b">disposable (replaceable any moment)</text>
</svg>
