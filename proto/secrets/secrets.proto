syntax = "proto3";

package secrets;

option go_package = "github.com/opensandbox/opensandbox/proto/secrets";

service SecretsService {
  // Secret CRUD
  rpc CreateSecret(CreateSecretRequest) returns (CreateSecretResponse);
  rpc ListSecrets(ListSecretsRequest) returns (ListSecretsResponse);
  rpc UpdateSecret(UpdateSecretRequest) returns (UpdateSecretResponse);
  rpc DeleteSecret(DeleteSecretRequest) returns (DeleteSecretResponse);

  // Secret Group CRUD
  rpc CreateSecretGroup(CreateSecretGroupRequest) returns (CreateSecretGroupResponse);
  rpc ListSecretGroups(ListSecretGroupsRequest) returns (ListSecretGroupsResponse);
  rpc GetSecretGroup(GetSecretGroupRequest) returns (GetSecretGroupResponse);
  rpc UpdateSecretGroup(UpdateSecretGroupRequest) returns (UpdateSecretGroupResponse);
  rpc DeleteSecretGroup(DeleteSecretGroupRequest) returns (DeleteSecretGroupResponse);

  // Secret Group Entries
  rpc SetSecretGroupEntries(SetSecretGroupEntriesRequest) returns (SetSecretGroupEntriesResponse);
  rpc GetSecretGroupEntries(GetSecretGroupEntriesRequest) returns (GetSecretGroupEntriesResponse);

  // Hot path: resolve a group into plaintext env vars + allowed hosts
  rpc ResolveSecretGroup(ResolveSecretGroupRequest) returns (ResolveSecretGroupResponse);

  // Session-based secret access — control plane never sees plaintext.
  // CreateSecretSession resolves + stores secrets server-side, returns sealed tokens.
  // ResolveSecretSession gives the worker the {sealedToken → realValue} mapping.
  rpc CreateSecretSession(CreateSecretSessionRequest) returns (CreateSecretSessionResponse);
  rpc ResolveSecretSession(ResolveSecretSessionRequest) returns (ResolveSecretSessionResponse);
  rpc DeleteSecretSession(DeleteSecretSessionRequest) returns (DeleteSecretSessionResponse);
}

// --- Secret messages ---

message Secret {
  string id = 1;
  string org_id = 2;
  string name = 3;
  string description = 4;
  int64 created_at = 5;   // unix seconds
  int64 updated_at = 6;   // unix seconds
}

message CreateSecretRequest {
  string org_id = 1;
  string name = 2;
  string description = 3;
  string plaintext_value = 4;
}

message CreateSecretResponse {
  Secret secret = 1;
}

message ListSecretsRequest {
  string org_id = 1;
}

message ListSecretsResponse {
  repeated Secret secrets = 1;
}

message UpdateSecretRequest {
  string org_id = 1;
  string secret_id = 2;
  string name = 3;           // empty = no change
  string description = 4;    // empty = no change
  optional string new_value = 5;  // absent = no change
}

message UpdateSecretResponse {}

message DeleteSecretRequest {
  string org_id = 1;
  string secret_id = 2;
}

message DeleteSecretResponse {}

// --- Secret Group messages ---

message SecretGroup {
  string id = 1;
  string org_id = 2;
  string name = 3;
  string description = 4;
  repeated string allowed_hosts = 5;
  int64 created_at = 6;  // unix seconds
}

message CreateSecretGroupRequest {
  string org_id = 1;
  string name = 2;
  string description = 3;
  repeated string allowed_hosts = 4;
}

message CreateSecretGroupResponse {
  SecretGroup group = 1;
}

message ListSecretGroupsRequest {
  string org_id = 1;
}

message ListSecretGroupsResponse {
  repeated SecretGroup groups = 1;
}

message GetSecretGroupRequest {
  string org_id = 1;
  string group_id = 2;
}

message GetSecretGroupResponse {
  SecretGroup group = 1;
}

message UpdateSecretGroupRequest {
  string org_id = 1;
  string group_id = 2;
  string name = 3;           // empty = no change
  string description = 4;    // empty = no change
  repeated string allowed_hosts = 5;
}

message UpdateSecretGroupResponse {}

message DeleteSecretGroupRequest {
  string org_id = 1;
  string group_id = 2;
}

message DeleteSecretGroupResponse {}

// --- Secret Group Entries ---

message SecretGroupEntry {
  string id = 1;
  string group_id = 2;
  string secret_id = 3;
  string secret_name = 4;   // populated by joins
  string env_var_name = 5;
}

message SetSecretGroupEntriesRequest {
  string group_id = 1;
  repeated SecretGroupEntryInput entries = 2;
}

message SecretGroupEntryInput {
  string secret_id = 1;
  string env_var_name = 2;
}

message SetSecretGroupEntriesResponse {}

message GetSecretGroupEntriesRequest {
  string group_id = 1;
}

message GetSecretGroupEntriesResponse {
  repeated SecretGroupEntry entries = 1;
}

// --- Resolve ---

message ResolveSecretGroupRequest {
  string group_id = 1;
  string org_id = 2;
}

message ResolveSecretGroupResponse {
  map<string, string> env_vars = 1;
  repeated string allowed_hosts = 2;
}

// --- Secret Sessions ---
// Sessions decouple secret resolution from secret transport.
// The control plane calls CreateSecretSession and receives sealed tokens (no plaintext).
// The worker calls ResolveSecretSession to get the {sealedToken → realValue} mapping.

message CreateSecretSessionRequest {
  string org_id = 1;
  string group_id = 2;
  string sandbox_id = 3;
  int32 ttl_seconds = 4;    // 0 = default (86400s / 24h)
}

message CreateSecretSessionResponse {
  string session_id = 1;
  string session_token = 2;                 // opaque bearer token for ResolveSecretSession
  map<string, string> sealed_tokens = 3;    // {envVarName: "osb_sealed_xxx"}
  repeated string allowed_hosts = 4;
  int64 expires_at = 5;                     // unix seconds
}

message ResolveSecretSessionRequest {
  string session_id = 1;
  string session_token = 2;
}

message ResolveSecretSessionResponse {
  map<string, string> token_values = 1;     // {"osb_sealed_xxx": "real-api-key"}
  repeated string allowed_hosts = 2;
}

message DeleteSecretSessionRequest {
  string session_id = 1;
}

message DeleteSecretSessionResponse {}
