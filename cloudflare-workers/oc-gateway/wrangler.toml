name = "oc-gateway"
main = "src/index.ts"
compatibility_date = "2025-06-01"
compatibility_flags = ["nodejs_compat"]

# Spend counter + hard gate (design 013 §4/§8). Used at org+agt grain (hard 402) and per-session
# grain (tracked-only). Strongly consistent, so concurrent calls can't double-spend past the cap.
[[durable_objects.bindings]]
name = "SPEND_COUNTER"
class_name = "SpendCounter"

# Per-(org, agt) lease-epoch floor — fences a rotated/revoked deploy token (design 013 §4).
[[durable_objects.bindings]]
name = "DEPLOY_LEASE"
class_name = "DeployLease"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["SpendCounter", "DeployLease"]

# Secrets (set with `wrangler secret put …`, never in this file):
#   GATEWAY_TOKEN_PUBLIC_KEY — base64url raw 32-byte Ed25519 PUBLIC key (minter holds the private key)
#   GATEWAY_ORKEY_SECRET     — bearer for the dedicated sessions-api org-OR-key seam (carries a live key)
#   GATEWAY_ADMIN_SECRET     — bearer that guards the control-plane admin routes (/admin/*)
#   TEST_OR_KEY              — acceptance-test single OR key override (bypasses the seam); never in prod
#   OC_INGEST_AUTH           — optional, per-session spend telemetry auth

[vars]
# GATEWAY_ORKEY_URL — the internal sessions-api route that returns an org's OR key {org}→{key}.
# AGENT_BUDGET_USD_DEFAULT — default HARD budget (USD) per org+agt for an unprovisioned grain; unset = uncapped.
# OPENROUTER_BASE   — leave unset for prod (https://openrouter.ai/api); override for a mock in tests.
# CACHE_CONTROL_UNSAFE_MODELS — extra comma-separated model patterns to strip cache_control for.
# OC_INGEST_URL     — optional per-session spend sink.
