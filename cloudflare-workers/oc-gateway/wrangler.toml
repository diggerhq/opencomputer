name = "oc-agent-gateway-local"
main = "src/index.ts"
compatibility_date = "2025-06-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = false

# Local/dev Durable Objects. Production repeats these non-inheritable bindings under its explicit
# environment and gets fresh state under the permanent Worker identity.
[[durable_objects.bindings]]
name = "SPEND_COUNTER"
class_name = "SpendCounter"

[[durable_objects.bindings]]
name = "DEPLOY_LEASE"
class_name = "DeployLease"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["SpendCounter", "DeployLease"]

# Production is deliberately available only through `npm run deploy:production`.
[env.production]
name = "oc-agent-gateway-prod"
workers_dev = true

[[env.production.durable_objects.bindings]]
name = "SPEND_COUNTER"
class_name = "SpendCounter"

[[env.production.durable_objects.bindings]]
name = "DEPLOY_LEASE"
class_name = "DeployLease"

[[env.production.migrations]]
tag = "v1"
new_sqlite_classes = ["SpendCounter", "DeployLease"]

[env.production.vars]
GATEWAY_ORKEY_URL = "https://api.opencomputer.dev/internal/gateway/org-key"

# Production secrets (set for --env production; never in this file):
#   GATEWAY_TOKEN_PUBLIC_KEY — base64url raw 32-byte Ed25519 public key
#   GATEWAY_ORKEY_SECRET     — bearer for the dedicated org-key route
#   GATEWAY_ADMIN_SECRET     — bearer for /admin/*
# No single-key test override exists; production and tests both exercise the org-key seam.
# AGENT_BUDGET_USD_DEFAULT is intentionally absent; managed OpenRouter/Autumn limits are authoritative.
