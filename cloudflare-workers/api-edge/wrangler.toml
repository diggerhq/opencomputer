# api-edge Worker — global API entry point at app.opencomputer.dev / app.dev.opensandbox.ai
#
# Routes:
#   POST /auth/login, /auth/refresh, /auth/logout — WorkOS flow + session JWT
#   POST /webhooks/stripe                          — Stripe webhook (DO /mark-pro)
#   POST /api/sandboxes                            — create flow (auth + credit check + cell select + cap-token mint + proxy to CP)
#   GET  /api/sandboxes                            — cross-region list (D1 sandboxes_index)
#   GET  /api/sandboxes/{id}                       — metadata with cell_endpoint
#   ANY  /api/sandboxes/{id}/*                     — 307 redirect to {cell_id}.app.opensandbox.ai (dumb-client fallback)
#   GET  /internal/halt-list                       — HMAC-auth, called by CP halt_reconciler

name = "opensandbox-edge-dev"
main = "src/index.ts"
compatibility_date = "2026-04-28"
compatibility_flags = ["nodejs_compat"]
account_id = "1241f114453e32d292197e3fb36210b2"

# Preview URL routing. Sandboxes expose ports via stable hostnames of the form
#   sb-{sandboxID}-p{port}.sb.opensandbox.ai
# regardless of which cell the sandbox is on; the Worker resolves
# sandboxes_index.cell_id at request time and forwards via that cell's CF
# Tunnel, so cell migration is invisible to the user.
#
# Wildcards in CF Worker routes must be at the start of the hostname, so
# `sb-*.opensandbox.ai/*` is invalid. We use `*.sb.opensandbox.ai/*` instead:
# the `.sb.` middle label creates a namespace that ONLY preview URLs use,
# isolating this rule from cp-*.opensandbox.ai (tunnels), app2.opensandbox.ai
# (dashboard), and events-app2.opensandbox.ai (events-ingest).
#
# Two-level wildcards aren't covered by CF Universal SSL — needs Advanced
# Certificate Manager ($10/mo, RSA-2048 via Google Trust Services). Cert
# ordered 2026-05-18 for *.sb.opensandbox.ai + sb.opensandbox.ai.
routes = [
  { pattern = "*.sb.opensandbox.ai/*", zone_name = "opensandbox.ai" },
]

# Static assets — the dashboard SPA. Built from `web/` by the deploy script
# (web/dist/ → cloudflare-workers/api-edge/assets/). The Worker handles
# explicit API/auth/webhook paths; anything else falls through to the SPA's
# index.html so client-side routing works.
[assets]
directory = "./assets"
binding = "ASSETS"
not_found_handling = "single-page-application"
# Run Worker first for EVERY request. The Worker dispatches by hostname
# (e.g. sb-*-p*.sb.opensandbox.ai → preview URL forwarder) AND by path
# (/api/*, /auth/*, /internal/*), then explicitly delegates to env.ASSETS
# at the bottom for anything unhandled — typically the dashboard SPA. Without
# this, the assets binding short-circuits hostname-based dispatch and returns
# index.html for / on every hostname, including preview URLs.
run_worker_first = true

[[d1_databases]]
binding = "OPENCOMPUTER_DB"
database_name = "opencomputer-dev"
database_id = "f9e534bf-a9f3-4b30-81cd-f9eb9087e96d"

[[kv_namespaces]]
binding = "SESSIONS_KV"
id = "694f22abd551461da4ad99839f161b2f"

[[durable_objects.bindings]]
name = "CREDIT_ACCOUNT"
class_name = "CreditAccount"
script_name = "opensandbox-edge-dev"

# Per-sandbox WebSocket gateway DO. Holds the client WS, dials the owning cell,
# bridges frames. Gated by WS_VIA_DO=1 below — when unset, the old transparent
# CF-Tunnel forward (index.ts) and edge-side WebSocketPair (dashboard.ts) paths
# stay in place, so disabling the flag is the fast rollback.
#
# script_name intentionally omitted (unlike CREDIT_ACCOUNT). After a sibling
# branch dropped this class and was deployed to dev, CF's binding validator
# (which checks against the currently-LIVE script when script_name names this
# script) rejected re-adding SANDBOX_WS — the live script no longer exported
# it. Omitting script_name makes it an implicit local binding resolved against
# the version under deploy, breaking the chicken-and-egg.
[[durable_objects.bindings]]
name = "SANDBOX_WS"
class_name = "SandboxWsGateway"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["CreditAccount"]

# v2 was applied to the deployed dev worker out-of-band, in advance of this
# branch landing (it created a SandboxWsGateway DO from an unmerged feature
# branch — the predecessor of this PR). Empty here so the ledger is
# contiguous and matches what CF has already recorded for v2.
[[migrations]]
tag = "v2"

# v3 was added by the billing PR (#349) to drop the orphaned out-of-band
# SandboxWsGateway class so that branch could deploy (CF blocks removing a
# depended-on class without an explicit delete-class migration).
[[migrations]]
tag = "v3"
deleted_classes = ["SandboxWsGateway"]

# v4 re-creates SandboxWsGateway via the now-canonical sandbox_ws_gateway.ts
# definition that lands with this PR. Paired with the SANDBOX_WS binding
# above and the WS_VIA_DO=1 gate below.
[[migrations]]
tag = "v4"
new_sqlite_classes = ["SandboxWsGateway"]


# Secrets (set via `wrangler secret put`):
#   SESSION_JWT_SECRET     — HMAC for session JWT (shared with all CPs in cell fleet)
#   CF_ADMIN_SECRET        — HMAC for /admin/halt-org and /admin/resume-org callbacks to CPs
#   STRIPE_WEBHOOK_SECRET  — verifies inbound Stripe webhook signatures
#   STRIPE_API_KEY         — for creating Stripe customer + subscription on /mark-pro
#   WORKOS_API_KEY         — server-side WorkOS API for /auth/login
#   WORKOS_CLIENT_ID       — WorkOS client identifier
#   EVENT_SECRET           — HMAC for /internal/halt-list endpoint (shared with CP halt_reconciler)

[vars]
WORKER_ENV = "dev"
# When "1", SDK pty/exec + Dashboard pty WS upgrades route through the
# SandboxWsGateway DO (per-sandbox, idFromName(sandboxID)) instead of the
# transparent CF-Tunnel forward / edge-side WebSocketPair. Off in prod until
# v1 parity is verified on dev.
WS_VIA_DO = "1"
# Cells available in this deployment — comma-separated cell_ids. The edge
# validates cell selections against this list; each cell's base_url comes from
# the D1 `cells` table (see schema.sql + scripts/seed_dev_xcell.sh).
# Cross-cell testbed: dev2 (Azure westus2) + dev3 (AWS us-east-1).
CELLS = "azure-us-west-2-b,aws-us-east-1-a"

# Ship console output + exceptions to opensandbox-log-tail, which forwards
# to Axiom dataset cf-dev. Keeps CF Worker logs durable in the same store
# as the VM journald stream so we can cross-correlate edge ↔ cell.
[[tail_consumers]]
service = "opensandbox-log-tail"
