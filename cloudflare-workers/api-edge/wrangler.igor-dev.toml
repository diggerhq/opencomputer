# api-edge — one-off `igor-dev` dev stack for the sandbox-webhooks
# rearchitecture e2e (PR #410), Milestone D (management + inline). Lives in
# **Mo's CF account b8f23cb8**. STRIPPED vs prod: no public routes, no SPA
# [assets] (no ./assets dir in-repo), no autumn cron [triggers], no tail_consumer
# (Axiom log-tail is prod-only), no SESSIONS_KV (the webhooks + api-key-auth path
# is pure D1 — webhooks.ts reads only EVENT_SECRET, OPENCOMPUTER_DB,
# SVIX_API_TOKEN). The CreditAccount DO is kept (self-contained, off the webhook
# path) so the worker's `export { CreditAccount }` has a matching migration.
# Deploy with:
#   wrangler deploy   --config wrangler.igor-dev.toml
#   wrangler secret put EVENT_SECRET   --config wrangler.igor-dev.toml   # == events-ingest-igor-dev EVENT_SECRET
#   wrangler secret put SVIX_API_TOKEN --config wrangler.igor-dev.toml
# See .agents/work/sandbox-webhooks-rearchitecture.md §8.

name = "opencomputer-api-edge-igor-dev"
main = "src/index.ts"
compatibility_date = "2026-04-28"
compatibility_flags = ["nodejs_compat"]
account_id = "b8f23cb87a7a6c64040d3134643da448"

[[d1_databases]]
binding = "OPENCOMPUTER_DB"
database_name = "opencomputer-igor-dev"
database_id = "d5bbb12a-0491-4a95-9d7d-32ed8c3ce15d"

# CreditAccount DO is self-hosted by this worker (script_name defaults to self).
[[durable_objects.bindings]]
name = "CREDIT_ACCOUNT"
class_name = "CreditAccount"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["CreditAccount"]

[vars]
WORKER_ENV = "igor-dev"
BURST_CELL_ID = ""
