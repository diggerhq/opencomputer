name: Apply D1 Migrations

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Migration action'
        required: true
        default: 'list'
        type: choice
        options:
          - list
          - apply

concurrency:
  group: apply-d1-migrations-prod
  cancel-in-progress: false

jobs:
  migrations:
    name: D1 migrations
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Resolve prod target
        id: target
        run: |
          echo "config=wrangler.prod.toml" >> "$GITHUB_OUTPUT"
          echo "database=OPENCOMPUTER_DB" >> "$GITHUB_OUTPUT"

      - name: Install api-edge dependencies
        working-directory: cloudflare-workers/api-edge
        run: npm ci

      - name: Prepare CI Wrangler config
        working-directory: cloudflare-workers/api-edge
        run: |
          python3 - <<'PY'
          from pathlib import Path

          src = Path("${{ steps.target.outputs.config }}")
          dst = Path("wrangler.ci.toml")
          lines = src.read_text().splitlines()

          out = []
          skipping_routes = False
          for line in lines:
              if line.startswith("routes = ["):
                  skipping_routes = True
                  continue
              if skipping_routes:
                  if line.strip() == "]":
                      skipping_routes = False
                  continue
              out.append(line)

          dst.write_text("\n".join(out).rstrip() + "\n")
          PY

      - name: List pending D1 migrations
        if: inputs.action == 'list'
        working-directory: cloudflare-workers/api-edge
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "CLOUDFLARE_API_TOKEN GitHub secret is required for Wrangler D1 migrations" >&2
            exit 1
          fi
          npx wrangler d1 migrations list "${{ steps.target.outputs.database }}" --remote -c wrangler.ci.toml

      - name: Apply pending D1 migrations
        if: inputs.action == 'apply'
        working-directory: cloudflare-workers/api-edge
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "CLOUDFLARE_API_TOKEN GitHub secret is required for Wrangler D1 migrations" >&2
            exit 1
          fi
          npx wrangler d1 migrations apply "${{ steps.target.outputs.database }}" --remote -c wrangler.ci.toml
